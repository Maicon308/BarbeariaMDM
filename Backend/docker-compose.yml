services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: barbearia_mdm
      POSTGRES_USER: barbearia
      POSTGRES_PASSWORD: barbearia
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barbearia -d barbearia_mdm"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_local_data:

